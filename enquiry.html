<!--This is the enquiry form that will consist of the name, email, and messages text.-->
<section>
    <h2>Enquiry Form</h2>

 <form onsubmit="reurn validateForm()">
  <table>
    <tr>
      <td><label for="enquiryType">Enquiry Type:</label></td>
      <td>
        <select id="enquiryType" required style="width: 200px;">
          <option value="">Select an option</option>
          <option>Custom Cakes</option>
          <option>Cupcakes</option>
          <option>Pastries</option>
          <option>Birthday Orders</option>
          <option>Pricing Information</option>
        </select>
      </td>
    </tr>

    <tr>
      <td><label for="phone">Phone Number:</label></td>
      <td><input type="tel" id="phone" required style="width: 200px;"></td>
    </tr>

    <tr>
      <td><label for="name">Name:</label></td>
      <td><input type="text" id="name" required style="width: 200px;"></td>
    </tr>

    <tr>
      <td><label for="email">Email:</label></td>
      <td><input type="email" id="email" required style="width: 200px;"></td>
    </tr>

    <tr>
      <td><label for="message">Message:</label></td>
      <td>
        <textarea id="message" rows="4" required style="width: 200px; resize: vertical;"></textarea>
      </td>
    </tr>

    <tr>
      <td></td>
      <td>
        <button type="submit">Submit</button>
      </td>
    </tr>
  </table>
</form>   
     
</section>  

<script src="js/script.js"></script>
    
</body>
</html>
