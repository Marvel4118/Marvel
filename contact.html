<!--The contact section display contact details-->
<section>
    
 <div class="contact-container">
  
  <div class="contact-column form-side">
    <h2>Contact Us</h2>
    <form onsubmit="return validateContactForm()">
      
      <div class="form-group">
        <label for="contactName">Name:</label>
        <input type="text" id="contactName" required>
      </div>

      <div class="form-group">
        <label for="contactEmail">Email:</label>
        <input type="email" id="contactEmail" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject:</label>
        <input type="text" id="subject" required>
      </div>

      <div class="form-group">
        <label for="contactMessage">Message:</label>
        <textarea id="contactMessage" rows="5" required></textarea>
      </div>

      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div>

  <div class="contact-column info-side">
    <div class="info-details">
      <p><strong>Email:</strong> info@sweetrise.com</p>
      <p><strong>Phone:</strong> 012 345 6789</p>
      <p><strong>Location:</strong> Pretoria, South Africa</p>
    </div>
  </div>

</div>
